name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_KEY: test-service-role-key
      OPENAI_API_KEY: test-openai-key
      SUPABASE_JWT_SECRET: test-jwt-secret
      ALLOWED_DOCUMENT_HOSTS: example.supabase.co
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Backend syntax check
        run: python -m compileall -q backend

      - name: Run backend tests
        run: pytest -q backend/tests

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Pulling latest code ==="
            cd /root/law-agent
            git pull origin main

            echo "=== Building new image ==="
            cd backend
            docker build -t auslaw-backend .

            echo "=== Restarting container ==="
            docker stop auslaw-backend || true
            docker rm auslaw-backend || true
            docker run -d \
              --name auslaw-backend \
              --env-file .env \
              -e HOST=0.0.0.0 \
              -e PORT=8000 \
              -p 80:8000 \
              --restart unless-stopped \
              auslaw-backend
            docker image prune -f

            echo "=== Waiting for startup ==="
            sleep 10

            echo "=== Health check ==="
            curl -f http://localhost/health || (echo "HEALTH CHECK FAILED" && docker logs auslaw-backend --tail 20 && exit 1)
            echo "=== Deploy successful ==="
